<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Bem-vindo de volta</mat-card-title>
      <mat-card-subtitle>Acesse sua conta para gerenciar agendamentos</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" placeholder="seu@email.com">
          <mat-icon matSuffix>email</mat-icon>
          @if (form.get('email')?.hasError('required')) {
            <mat-error>Digite seu e-mail</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput type="password" formControlName="password">
          <mat-icon matSuffix>lock</mat-icon>
          @if (form.get('password')?.hasError('required')) {
            <mat-error>Digite sua senha</mat-error>
          }
        </mat-form-field>

        <div class="actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || isLoading()">
            @if (isLoading()) {
              Entrando...
            } @else {
              ENTRAR
            }
          </button>
        </div>

      </form>
    </mat-card-content>

    <mat-card-footer class="footer-link">
      <p>Ainda não tem conta? <a routerLink="/register">Cadastre-se</a></p>
    </mat-card-footer>
  </mat-card>
</div>
